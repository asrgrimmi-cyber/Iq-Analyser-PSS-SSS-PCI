
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>IQ Analyzer Dashboard</title>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
        <style>
            body {
                font-family: 'Inter', sans-serif;
                background: #0f172a;
                color: #f8fafc;
                margin: 0;
                padding: 40px 20px;
            }
            .container {
                max-width: 1400px;
                margin: 0 auto;
            }
            h1 {
                text-align: center;
                font-weight: 800;
                font-size: 3rem;
                margin-bottom: 50px;
                background: linear-gradient(135deg, #38bdf8, #818cf8);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                text-shadow: 0 4px 20px rgba(56, 189, 248, 0.2);
            }
            .grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));
                gap: 40px;
                margin-top: 20px;
            }
            .card {
                background: rgba(30, 41, 59, 0.7);
                border-radius: 20px;
                overflow: hidden;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
                border: 1px solid rgba(255, 255, 255, 0.05);
                backdrop-filter: blur(10px);
                transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease, border-color 0.3s ease;
            }
            .card:hover {
                transform: translateY(-8px);
                box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
                border-color: rgba(56, 189, 248, 0.4);
            }
            .parameters-card {
                grid-column: 1 / -1;
                background: rgba(15, 23, 42, 0.8);
                border-color: rgba(56, 189, 248, 0.3);
            }
            .parameters-card .card-header {
                background: rgba(56, 189, 248, 0.1);
            }
            .card-header {
                padding: 20px 25px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
                background: rgba(15, 23, 42, 0.5);
            }
            .card-header h3 {
                margin: 0;
                font-size: 1.25rem;
                font-weight: 600;
                color: #e2e8f0;
            }
            .card-body {
                padding: 25px;
            }
            .param-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                gap: 15px;
            }
            .param-item {
                padding: 12px 15px;
                background: rgba(255, 255, 255, 0.03);
                border-radius: 10px;
                border: 1px solid rgba(255, 255, 255, 0.05);
                display: flex;
                flex-direction: column;
                gap: 5px;
            }
            .param-label {
                color: #94a3b8;
                font-weight: 600;
                font-size: 0.95rem;
            }
            .param-value {
                color: #38bdf8;
                font-weight: 800;
                font-family: monospace;
                font-size: 1.1rem;
            }
            .card-image {
                padding: 20px;
                background: white; /* Images have white background */
            }
            .card-image img {
                width: 100%;
                height: auto;
                display: block;
                border-radius: 8px;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>IQ Analyzer Dashboard</h1>
            <div class="grid">
                
                <div class="card"><div class="card-header"><h3>Plot 1</h3></div><div class="card-image"><img src="static/images/01_Plot_1.png" alt="Plot 1" loading="lazy"></div></div><div class="card"><div class="card-header"><h3>Plot 2</h3></div><div class="card-image"><img src="static/images/02_Plot_2.png" alt="Plot 2" loading="lazy"></div></div><div class="card"><div class="card-header"><h3>Plot 3</h3></div><div class="card-image"><img src="static/images/03_Plot_3.png" alt="Plot 3" loading="lazy"></div></div><div class="card"><div class="card-header"><h3>Plot 4</h3></div><div class="card-image"><img src="static/images/04_Plot_4.png" alt="Plot 4" loading="lazy"></div></div>
            </div>
        </div>
    </body>
    </html>
